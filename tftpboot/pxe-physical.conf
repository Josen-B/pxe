# AxVisor PXE Configuration - 独立DHCP模式（直连网络）
# 使用场景：服务器和开发板直连，或独立网络环境

# 关闭本地 DNS 功能
port=0

# 监听物理网卡
interface=eno1np0
bind-interfaces

# 独立DHCP服务器模式
# 提供IP地址池：192.168.1.100 - 192.168.1.200
dhcp-range=192.168.1.100,192.168.1.200,255.255.255.0,12h

# 为开发板分配固定IP
dhcp-host=88:88:88:88:87:88,192.168.1.4,infinite

# UEFI客户端识别
dhcp-match=set:efi-x86_64,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9
dhcp-match=set:bios,option:client-arch,0

# PXE启动选项
# TFTP服务器地址
dhcp-option=option:tftp-server-address,192.168.1.2

# 识别 iPXE（二阶段 DHCP）
dhcp-userclass=set:ipxe,iPXE

# UEFI 客户端使用我们自编译的 ipxe-mb.efi
dhcp-boot=tag:!ipxe,tag:efi-x86_64,ipxe-mb.efi,,192.168.1.2
# Legacy BIOS 客户端使用 undionly.kpxe
dhcp-boot=tag:!ipxe,tag:bios,undionly.kpxe,,192.168.1.2
# 兜底：非 iPXE 且既不是 UEFI x86_64 也不是 BIOS 时才下发 ipxe.efi
dhcp-boot=tag:!ipxe,tag:!efi-x86_64,tag:!bios,ipxe.efi,,192.168.1.2

# iPXE：下发启动脚本（随后由脚本加载 GRUB）
dhcp-boot=tag:ipxe,boot.ipxe,,192.168.1.2

# iPXE启动脚本
pxe-service=x86PC, "iPXE", boot.ipxe

# TFTP 配置
enable-tftp
tftp-root=/var/lib/tftpboot
tftp-no-fail

# 日志
log-dhcp
log-queries
